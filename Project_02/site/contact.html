<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-config="siteTitle">お問い合わせ | 読み込んでいます...</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:wght@400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-wrapper {
            display: flex;
            gap: 60px;
            flex-wrap: wrap;
        }

        .contact-info {
            flex: 1;
            min-width: 300px;
        }

        .contact-form {
            flex: 1.5;
            min-width: 300px;
        }

        .info-item {
            margin-bottom: 2rem;
        }

        .info-label {
            color: var(--color-accent);
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--color-line);
            padding-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo serif" data-config="officeName">事務所名</div>
            <!-- ... (Same nav) -->
            <nav class="site-nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">トップ</a></li>
                    <li><a href="about.html" class="nav-link">事務所概要</a></li>
                    <li><a href="services.html" class="nav-link">業務内容</a></li>
                    <li><a href="pricing.html" class="nav-link">料金案内</a></li>
                    <li><a href="contact.html" class="nav-link">お問い合わせ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main style="padding-top: var(--header-height);">
        <!-- Page Header -->
        <section class="section"
            style="background-color: var(--color-white); border-bottom: 1px solid var(--color-line);">
            <div class="container">
                <h1 class="serif" style="font-size: 2.5rem; text-align: center; margin-bottom: 0;">お問い合わせ</h1>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="contact-wrapper">
                    <div class="contact-info">
                        <h2 class="serif">連絡先</h2>
                        <p style="margin-bottom: 3rem;">
                            業務に関するご相談、お見積もりのご依頼など、お気軽にお問い合わせください。内容を確認後、担当者より折り返しご連絡させていただきます。</p>

                        <div class="info-item">
                            <span class="info-label">お電話</span>
                            <div class="info-value" style="font-size: 1.5rem; font-weight: 700;" data-config="tel">
                            </div>
                            <p style="font-size: 0.8rem; color: var(--color-text-light);" data-config="businessHours">
                            </p>
                        </div>

                        <div class="info-item">
                            <span class="info-label">メールアドレス</span>
                            <div class="info-value"><a href="mailto:" data-config="email"></a></div>
                        </div>

                        <div class="info-item">
                            <span class="info-label">所在地</span>
                            <div class="info-value" data-config="address"></div>
                        </div>
                    </div>

                    <div class="contact-form">
                        <h2 class="serif">フォームからお問い合わせ</h2>
                        <!-- main.js が OFFICE_CONFIG.googleFormsUrl を元にここにiframeを挿入します -->
                        <div id="google-form-container"
                            style="background: #f9f9f9; padding: 20px; border-radius: 4px; border: 1px dashed var(--color-line);">
                            <p style="text-align: center; padding: 100px 0; color: var(--color-text-light);">
                                フォームを読み込み中、または設定されていません。</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="section" style="background-color: var(--color-primary); color: var(--color-white); padding: 80px 0;">
        <div class="container"
            style="display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 250px;">
                <h2 class="serif" data-config="officeName" style="font-size: 1.5rem; margin-bottom: 1.5rem;">事務所名</h2>
                <p style="font-size: 0.9rem; opacity: 0.8;" data-config="address">住所が入ります</p>
                <p style="font-size: 1.2rem; font-weight: 700; margin: 15px 0;" data-config="tel">電話番号</p>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <p style="font-weight: 700; margin-bottom: 1rem;">Menu</p>
                <ul style="font-size: 0.9rem; opacity: 0.8; display: grid; gap: 10px;">
                    <li><a href="about.html">事務所概要</a></li>
                    <li><a href="services.html">業務内容</a></li>
                    <li><a href="pricing.html">料金案内</a></li>
                    <li><a href="privacy.html">プライバシーポリシー</a></li>
                </ul>
            </div>
        </div>
        <div class="container"
            style="margin-top: 60px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 0.8rem; opacity: 0.5;">
            &copy; <span data-config="officeName"></span> All Rights Reserved.
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
